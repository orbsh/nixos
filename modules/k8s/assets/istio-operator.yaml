apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: istio
  namespace: istio-system
spec:
  profile: minimal
  components:
    ingressGateways:
      - name: istio-ingressgateway
        enabled: true
        k8s:
          service:
            type: NodePort
            ports:
              - name: status-port
                port: 15021
                targetPort: 15021
              - name: http2
                port: 80
                targetPort: 8080
                nodePort: 80
              - name: https
                port: 443
                targetPort: 8443
                nodePort: 443
              - name: tcp-ssh
                port: 22
                targetPort: 22
                nodePort: 22
              - name: udp-dns
                port: 53
                protocol: UDP
                targetPort: 53
                nodePort: 10053
    egressGateways:
      - name: istio-egressgateway
        enabled: true
  values:
    global:
      proxy:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
    gateways:
      istio-ingressgateway:
        runAsRoot: true
